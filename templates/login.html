{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="auth-card">
            <div class="auth-header">
                <h3 class="fw-bold mb-0">Welcome Back</h3>
                <p class="text-white-50 mt-2 mb-0">Please sign in to your employee account</p>
            </div>
            <div class="auth-body">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted">User Identifier</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control border-start-0"
                                placeholder="Name, Email or Emp ID" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted">Secure Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control border-start-0" required
                                placeholder="••••••••">
                        </div>
                    </div>
                    <button class="btn btn-auth w-100 mt-2">Sign In</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted mb-0">New employee? <a href="{{ url_for('signup') }}"
                            class="text-primary text-decoration-none fw-bold">Register Here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
